<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarvelVerse | Choose Your Hero</title>
    <meta name="description" content="Explore Marvel heroes, learn their abilities, and share why you love them on the premium MarvelVerse platform.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Hero Section -->
    <section id="hero">
        <div class="hero-content">
            <h1>MarvelVerse</h1>
            <p>Unleash the Hero Within. Choose Your Side.</p>
        </div>
        <div class="scroll-indicator">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
        </div>
    </section>

    <!-- Character Showcase Section -->
    <section id="showcase">
        <h2 class="section-title">The Avengers Initiative</h2>
        <div class="character-grid" id="characterGrid">
            <!-- Cards will be injected by JS -->
        </div>
    </section>

    <!-- User Interaction Section -->
    <section id="interaction">
        <div class="interaction-container">
            <h2 class="section-title" id="interactionTitle">Assemble</h2>
            
            <!-- Auth Form -->
            <div id="authContainer" class="auth-forms active-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="tony@stark.com">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                <button class="btn" id="authBtn">Login</button>
                <p class="auth-toggle">Don't have an account? <span id="toggleAuth">Sign Up</span></p>
            </div>

            <!-- Fan Input Form (Hidden until logged in) -->
            <div id="fanInputForm" class="fan-input">
                <div class="selected-hero-preview">
                    <div class="preview-img-container">
                        <img id="selectedHeroImg" src="" alt="">
                    </div>
                    <div class="preview-text">
                        <p>Selected Hero</p>
                        <h3 id="selectedHeroDisplay">None</h3>
                    </div>
                </div>
                <div class="input-group">
                    <label for="reason">Why is this your favorite hero?</label>
                    <textarea id="reason" rows="4" maxlength="200" placeholder="He saved the universe..."></textarea>
                    <small id="charCount" style="color: var(--text-secondary);">0 / 200</small>
                </div>
                <button class="btn" id="submitBtn">Save Favorite</button>
                <button class="btn" id="logoutBtn" style="background: transparent; border: 1px solid var(--glass-border); margin-top: 10px;">Logout</button>
            </div>
        </div>
    </section>

    <!-- Feed Section -->
    <section id="feed">
        <h2 class="section-title">Hero Registry</h2>
        <div class="feed-container" id="feedContainer">
            <!-- Feed items will be injected by JS -->
        </div>
    </section>

    <!-- Character Detail Modal -->
    <div class="modal" id="characterModal">
        <div class="modal-content">
            <span class="modal-close" id="closeModal">&times;</span>
            <div class="modal-img-container">
                <img src="" alt="" id="modalImg">
            </div>
            <div class="modal-details">
                <h2 id="modalName">Character Name</h2>
                <p class="tagline" id="modalTagline">Tagline goes here</p>
                <div class="powers">
                    <h4>Powers & Abilities</h4>
                    <ul id="modalPowers">
                        <!-- Powers injected by JS -->
                    </ul>
                </div>
                <div class="description">
                    <h4>Why they are great</h4>
                    <p id="modalDesc"></p>
                </div>
                <button class="btn" id="selectHeroBtn" style="margin-top: 20px;">I Choose You</button>
            </div>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script type="module" src="app.js"></script>
</body>
</html>
